# Falcon Right Half - Config
CONFIG_ZMK_SPLIT=y

# SPI + input subsystem for PMW3610
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# Input relay: sends trackball events from this peripheral to the dongle
CONFIG_ZMK_INPUT_SPLIT=y

# nice!nano v2 requires extra time for VCC to stabilise before the sensor
# can be initialised. Without this you will see "Incorrect product id 0xFF"
# in logs and the trackball will not work.
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
