manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: badjeff
      url-base: https://github.com/badjeff

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    # PMW3610 trackball driver
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: main

    # Relay trackball input events from right peripheral to dongle central
    - name: zmk-split-peripheral-input-relay
      remote: badjeff
      revision: main

  self:
    path: config
